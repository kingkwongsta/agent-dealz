steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "gcr.io/$PROJECT_ID/agent-dealz-backend",
        ".",
      ]

  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/agent-dealz-backend"]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "agent-dealz-backend"
      - "--image"
      - "gcr.io/$PROJECT_ID/agent-dealz-backend"
      - "--region"
      - "us-central1"
      - "--platform"
      - "managed"
      - "--memory"
      - "2Gi"
      - "--cpu"
      - "2"
      - "--timeout"
      - "300"
      - "--concurrency"
      - "10"
      - "--min-instances"
      - "0"
      - "--max-instances"
      - "3"
      - "--allow-unauthenticated"
      - "--set-env-vars"
      - "GCP_PROJECT_ID=$PROJECT_ID"

images:
  - "gcr.io/$PROJECT_ID/agent-dealz-backend"
